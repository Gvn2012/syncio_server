spring.application.name=messaging-service
server.port=8089

# MongoDB Configuration (Shared cluster with notification-service)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://vietp6861_db_user:OxvEjMko11affa2A@syncio-clt.fgkymji.mongodb.net/?appName=syncio-clt}
spring.data.mongodb.database=messaging_service

# Redis Configuration for Session/Status Management
spring.data.redis.host=${SPRING_REDIS_HOST:syncio-redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:syncio-kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://syncio-zipkin:9411/api/v2/spans

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.data.redis=DEBUG
