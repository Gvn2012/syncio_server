spring.application.name=relationship-service

server.port=8087



spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://34.21.187.164:3306/syncio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gvn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gvn2012@Phmz}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://syncio-zipkin:9411/api/v2/spans}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.spring.web.client.request=true
management.metrics.distribution.percentiles-histogram.spring.web.client.response=true
management.metrics.distribution.percentiles-histogram.spring.cloud.gateway.requests = true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:relationship-service}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=${SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES:io.github.gvn2012.shared.kafka_events}
springdoc.api-docs.path=/api/v1/relationship/v3/api-docs
spring.kafka.listener.observation-enabled=${SPRING_KAFKA_LISTENER_OBSERVATION_ENABLED:true}
spring.kafka.template.observation-enabled=${SPRING_KAFKA_TEMPLATE_OBSERVATION_ENABLED:true}
