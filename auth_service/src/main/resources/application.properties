spring.application.name=auth-service
eureka.client.enabled=false
eureka.instance.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.loadbalancer.enabled=false

server.port=${SERVER_PORT:8081}

jwt.secret_key=${JWT_SECRET_KEY:ThisIsAVeryLongSecretKeyThatMustBeAtLeast64CharactersLongForHS512Algorithm}
jwt.access_token_duration=${JWT_ACCESS_TOKEN_DURATION:6000000}
jwt.refresh_token_duration=${JWT_REFRESH_TOKEN_DURATION:2592000000}

management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.spring.web.client.request=true
management.metrics.distribution.percentiles-histogram.spring.web.client.response=true
management.metrics.distribution.percentiles-histogram.spring.cloud.gateway.requests=true

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://34.21.187.164:3306/syncio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gvn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gvn2012@Phmz}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://syncio-zipkin:9411/api/v2/spans}
springdoc.api-docs.path=/api/v1/auth/v3/api-docs