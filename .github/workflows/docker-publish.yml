name: Build & Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send start notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *CI/CD Pipeline Started*
            
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* `${{ github.actor }}`
            *Time:* `${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}`
            
            Building and pushing updated images...

      - name: Login to Docker Hub
        id: login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Detect changed files
        run: |
          git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Build & Push changed images
        id: build
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -e
          IMAGE_TAG=${{ github.sha }}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          
          REBUILT_SERVICES=""
          ALL_CHANGED=false
          if grep -Eq '^(pom.xml|common/|shared/)' changed_files.txt; then
            ALL_CHANGED=true
          fi

          build_if_needed () {
            local service_name="$1"
            local service_dir="$2"
            local dockerfile="$3"
            local image_name="$4"

            if [ "$ALL_CHANGED" = true ] || grep -q "^${service_dir}/" changed_files.txt || grep -q "^${dockerfile}$" changed_files.txt; then
              echo "Building and pushing ${service_name} with tag ${IMAGE_TAG}..."
              docker build -t "${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}" -f "${dockerfile}" .
              docker push "${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}"
              
              # Update manifests
              echo "Updating manifest for ${service_name}..."
              if [ -f k8s/services.yaml ]; then
                sed -i "s|image: ${DOCKER_USERNAME}/${image_name}:.*|image: ${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}|g" k8s/services.yaml
              fi
              if [ -f k8s/gateway.yaml ]; then
                sed -i "s|image: ${DOCKER_USERNAME}/${image_name}:.*|image: ${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}|g" k8s/gateway.yaml
              fi
              REBUILT_SERVICES="${REBUILT_SERVICES}\n- ${service_name} ✅"
            else
              echo "Skipping ${service_name} (no changes)"
            fi
            echo "${REBUILT_SERVICES}" > /tmp/rebuilt_list.txt
          }

          touch /tmp/rebuilt_list.txt
          build_if_needed "discovery-service" "discovery_service" "discovery_service/Dockerfile" "discovery-service"
          build_if_needed "auth-service" "auth_service" "auth_service/Dockerfile" "auth-service"
          build_if_needed "user-service" "user_service" "user_service/Dockerfile" "user-service"
          build_if_needed "relationship-service" "relationship_service" "relationship_service/Dockerfile" "relationship-service"
          build_if_needed "post-service" "post_service" "post_service/Dockerfile" "post-service"
          build_if_needed "notification-service" "notification_service" "notification_service/Dockerfile" "notification-service"
          build_if_needed "telegram-bot" "telegram_bot" "telegram_bot/Dockerfile" "telegram-bot"
          build_if_needed "api-gateway" "api_gateway" "api_gateway/Dockerfile" "api-gateway"
          build_if_needed "org-service" "org_service" "org_service/Dockerfile" "org-service"
          build_if_needed "uploading-service" "uploading_service" "uploading_service/Dockerfile" "uploading-service"
          build_if_needed "permission-service" "permission_service" "permission_service/Dockerfile" "permission-service"
          build_if_needed "search-service" "search_service" "search_service/Dockerfile" "search-service"
          build_if_needed "ranking-service" "ranking_service" "ranking_service/Dockerfile" "ranking-service"
          build_if_needed "messaging-service" "messaging_service" "messaging_service/Dockerfile" "messaging-service"

          echo "REBUILT_LIST<<EOF" >> $GITHUB_ENV
          cat /tmp/rebuilt_list.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Commit and push changes
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          if git diff --staged --quiet; then
            echo "No changes in manifests to commit"
          else
            git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi

      - id: 'auth'
        if: always()
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.SERVICE_ACCOUNT_EMAIL }}'

      - name: 'Get GKE credentials'
        if: always()
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: 'syncio-cluster'
          location: 'asia-southeast1-a'

      - name: Get Pod Status
        if: always()
        run: |
          echo "FINISHED_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "POD_STATUS<<EOF" >> $GITHUB_ENV
          {
            echo "*Summary by Status:*"
            kubectl get pods -n syncio --no-headers | awk '{print $3}' | sort | uniq -c | awk '{print "• "$2": "$1}' || echo "No pods found."
            echo ""
            if kubectl get pods -n syncio --no-headers | grep -vE "Running|Completed" > /dev/null; then
              echo "*Unhealthy/Pending Pods:*"
              kubectl get pods -n syncio --no-headers | grep -vE "Running|Completed" | awk '{print "• "$1 " (" $3 ")"}'
            fi
          } >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send result notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🏁 *CI/CD Pipeline Completed*
            
            *Status:* `${{ job.status == 'success' && 'Success' || 'Failure' }}`
            *Finished:* `${{ env.FINISHED_TIME }}`
            
            *Images Rebuilt:*
            ${{ env.REBUILT_LIST || 'None' }}
            
            *Namespace (syncio) Pod Status:*
            ```
            ${{ env.POD_STATUS }}
            ```
            
            ${{ job.status == 'success' && '✅ *All steps passed!*' || format('❌ *Failed at step:* `{0}`', (steps.login.outcome == 'failure' && 'Login') || (steps.build.outcome == 'failure' && 'Build/Push') || (steps.commit.outcome == 'failure' && 'Git Push') || (steps.auth.outcome == 'failure' && 'GCP Auth') || 'Unknown') }}
            
            ${{ job.status == 'success' && 'Deployment sync triggered. Check ArgoCD for final health status.' || 'Please check GitHub Actions logs for details.' }}
