name: Build & Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send start notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 *CI/CD Pipeline Started*
            
            *Repository:* `${{ github.repository }}`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Author:* `${{ github.actor }}`
            
            Building and pushing updated images...

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Detect changed files
        run: |
          git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Build & Push changed images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -e
          IMAGE_TAG=${{ github.sha }}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

          ALL_CHANGED=false
          if grep -Eq '^(pom.xml|common/|shared/)' changed_files.txt; then
            ALL_CHANGED=true
          fi

          build_if_needed () {
            local service_name="$1"
            local service_dir="$2"
            local dockerfile="$3"
            local image_name="$4"

            if [ "$ALL_CHANGED" = true ] || grep -q "^${service_dir}/" changed_files.txt || grep -q "^${dockerfile}$" changed_files.txt; then
              echo "Building and pushing ${service_name} with tag ${IMAGE_TAG}..."
              docker build -t "${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}" -f "${dockerfile}" .
              docker push "${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}"
              
              # Update manifests
              echo "Updating manifest for ${service_name}..."
              if [ -f k8s/services.yaml ]; then
                sed -i "s|image: ${DOCKER_USERNAME}/${image_name}:.*|image: ${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}|g" k8s/services.yaml
              fi
              if [ -f k8s/gateway.yaml ]; then
                sed -i "s|image: ${DOCKER_USERNAME}/${image_name}:.*|image: ${DOCKER_USERNAME}/${image_name}:${IMAGE_TAG}|g" k8s/gateway.yaml
              fi
            else
              echo "Skipping ${service_name} (no changes)"
            fi
          }

          build_if_needed "discovery-service" "discovery_service" "discovery_service/Dockerfile" "discovery-service"
          build_if_needed "auth-service" "auth_service" "auth_service/Dockerfile" "auth-service"
          build_if_needed "user-service" "user_service" "user_service/Dockerfile" "user-service"
          build_if_needed "relationship-service" "relationship_service" "relationship_service/Dockerfile" "relationship-service"
          build_if_needed "post-service" "post_service" "post_service/Dockerfile" "post-service"
          build_if_needed "notification-service" "notification_service" "notification_service/Dockerfile" "notification-service"
          build_if_needed "api-gateway" "api_gateway" "api_gateway/Dockerfile" "api-gateway"
          build_if_needed "org-service" "org_service" "org_service/Dockerfile" "org-service"
          build_if_needed "permission-service" "permission_service" "permission_service/Dockerfile" "permission-service"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          if git diff --staged --quiet; then
            echo "No changes in manifests to commit"
          else
            git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]"
            git push
          fi

      - name: Send result notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *CI/CD Pipeline Completed*
            
            *Status:* `${{ job.status == 'success' && 'Success' || 'Failure' }}`
            *Commit:* `${{ github.sha }}`
            
            ${{ job.status == 'success' && 'Images built and manifests updated successfully. Deployment sync triggered.' || 'Pipeline failed! Check GitHub Actions logs.' }}