apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: syncio-app
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-deployed-telegram.telegram: ""
    notifications.argoproj.io/subscribe.on-health-degraded-telegram.telegram: ""
    notifications.argoproj.io/subscribe.on-health-healthy-telegram.telegram: ""
    notifications.argoproj.io/subscribe.on-health-progressing-telegram.telegram: ""
    notifications.argoproj.io/subscribe.on-sync-failed-telegram.telegram: ""
    notifications.argoproj.io/subscribe.on-sync-running-telegram.telegram: ""
spec:
  project: default
  source:
    repoURL: https://github.com/Gvn2012/syncio_server.git
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: syncio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
