spring.application.name=user-service



grpc.client.permission-service.address=dns:///${SYNCIO_PERMISSION_HOST:syncio-permission}:9090
grpc.client.permission-service.negotiationType=PLAINTEXT

server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://34.143.230.116:3306/syncio}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gvn}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gvn2012@Phmz}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://syncio-zipkin:9411/api/v2/spans}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.spring.web.client.request=true
management.metrics.distribution.percentiles-histogram.spring.web.client.response=true
management.metrics.distribution.percentiles-histogram.spring.cloud.gateway.requests = true

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
springdoc.api-docs.path=/api/v1/users/v3/api-docs
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

grpc.client.auth-service.address=dns:///${SYNCIO_AUTH_HOST:syncio-auth}:9090
grpc.client.auth-service.negotiationType=PLAINTEXT

grpc.client.org-service.address=dns:///${SYNCIO_ORG_HOST:syncio-org}:9090
grpc.client.org-service.negotiationType=PLAINTEXT

grpc.client.upload-service.address=dns:///${SYNCIO_UPLOADING_HOST:syncio-uploading}:9090
grpc.client.upload-service.negotiationType=PLAINTEXT
