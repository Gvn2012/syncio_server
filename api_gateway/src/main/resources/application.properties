spring.application.name=api_gateway

server.port=8080

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.gateway.cloud.RouteDefinitionRoute=DEBUG

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.spring.web.client.request=true
management.metrics.distribution.percentiles-histogram.spring.web.client.response=true
management.metrics.distribution.percentiles-histogram.spring.cloud.gateway.requests = true

management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[1].id=discovery-service
spring.cloud.gateway.routes[1].uri=${DISCOVERY_SERVICE_UI_URL:http://localhost:8761}
spring.cloud.gateway.routes[1].predicates[0]=Path=/eureka,/eureka/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/eureka/?(?<segment>.*), /${segment}

spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/notifications/**

spring.cloud.gateway.routes[4].id=friend-service
spring.cloud.gateway.routes[4].uri=lb://friend-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/friends/**

spring.cloud.gateway.routes[5].id=post-service
spring.cloud.gateway.routes[5].uri=lb://post-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/posts/**
