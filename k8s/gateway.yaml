apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-gateway
  namespace: syncio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-gateway
  template:
    metadata:
      labels:
        app: syncio-gateway
    spec:
      containers:
        - name: gateway
          image: vietpham18/api-gateway:8a5effd54c350af4b13f62ddd8aa788d9ab93afa
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "750m"
              memory: "1Gi"
          env:
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED
              value: "false"
            - name: SPRING_CONFIG_LOCATION
              value: "file:/config/application.properties"
          volumeMounts:
            - name: config-volume
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
      volumes:
        - name: config-volume
          configMap:
            name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-gateway
  namespace: syncio
  annotations:
    cloud.google.com/backend-config: '{"default": "syncio-backend-config"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  selector:
    app: syncio-gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: syncio-backend-config
  namespace: syncio
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /actuator/health
    port: 8080
