apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/name: argocd-notifications-controller
    app.kubernetes.io/part-of: argocd
data:
  # Telegram Service Configuration
  service.telegram: |
    token: $telegram-token

  # HTML Templates (Much more reliable than Markdown for Telegram)
  template.sync-succeeded: |
    message: "✅ ArgoCD sync succeeded: {{.app.metadata.name}}"
  
  template.sync-failed: |
    message: "❌ ArgoCD sync failed: {{.app.metadata.name}}"

  template.sync-running: |
    message: "🔄 ArgoCD sync started: {{.app.metadata.name}}"

  # Notification Triggers
  trigger.on-sync-succeeded: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.sync.status == 'Synced'
      oncePer: app.status.sync.revision
      send: [sync-succeeded]
  
  trigger.on-sync-failed: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
      oncePer: app.status.sync.revision
      send: [sync-failed]

  trigger.on-sync-running: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Running']
      oncePer: app.status.sync.revision
      send: [sync-running]
