apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/name: argocd-notifications-controller
    app.kubernetes.io/part-of: argocd
data:
  # Telegram Service Configuration
  service.telegram: |
    token: $telegram-token

  # HTML Templates (Much more reliable than Markdown for Telegram)
  template.sync-succeeded: |
    telegram:
      message: |
        ✅ <b>ArgoCD: Sync Succeeded</b>
        <b>Application:</b> <code>{{.app.metadata.name}}</code>
        <b>Status:</b> <code>{{or .app.status.operationState.phase "Unknown"}}</code>
        <b>Revision:</b> <code>{{or .app.status.sync.revision "Unknown"}}</code>
  
  template.sync-failed: |
    telegram:
      message: |
        ❌ <b>ArgoCD: Sync Failed</b>
        <b>Application:</b> <code>{{.app.metadata.name}}</code>
        <b>Status:</b> <code>{{or .app.status.operationState.phase "Unknown"}}</code>
        <b>Revision:</b> <code>{{or .app.status.sync.revision "Unknown"}}</code>

  template.sync-running: |
    telegram:
      message: |
        🔄 <b>ArgoCD: Sync Started</b>
        <b>Application:</b> <code>{{.app.metadata.name}}</code>
        <b>Revision:</b> <code>{{or .app.status.sync.revision "Unknown"}}</code>

  # Notification Triggers
  trigger.on-sync-succeeded: |
    - when: app.status?.operationState.phase in ['Succeeded'] and app.status.sync.status == 'Synced'
      oncePer: app.status.sync.revision
      send: [sync-succeeded]
  
  trigger.on-sync-failed: |
    - when: app.status?.operationState.phase in ['Error', 'Failed']
      oncePer: app.status.sync.revision
      send: [sync-failed]

  trigger.on-sync-running: |
    - when: app.status?.operationState.phase in ['Running']
      oncePer: app.status.sync.revision
      send: [sync-running]
