apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/name: argocd-notifications-controller
    app.kubernetes.io/part-of: argocd
data:
  # Telegram via generic webhook to avoid native telegram notifier issues
  service.webhook.telegramapi: |
    url: https://api.telegram.org/bot$telegram-token
    headers:
      - name: Content-Type
        value: application/x-www-form-urlencoded

  template.sync-succeeded: |
    webhook:
      telegramapi:
        method: POST
        path: /sendMessage
        body: |
          chat_id=7537927055&text=✅+ArgoCD+sync+succeeded:+{{.app.metadata.name}}
  
  template.sync-failed: |
    webhook:
      telegramapi:
        method: POST
        path: /sendMessage
        body: |
          chat_id=7537927055&text=❌+ArgoCD+sync+failed:+{{.app.metadata.name}}

  template.sync-running: |
    webhook:
      telegramapi:
        method: POST
        path: /sendMessage
        body: |
          chat_id=7537927055&text=🔄+ArgoCD+sync+started:+{{.app.metadata.name}}

  # Notification Triggers
  trigger.on-sync-succeeded: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.sync.status == 'Synced'
      oncePer: app.status.sync.revision
      send: [sync-succeeded]
  
  trigger.on-sync-failed: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
      oncePer: app.status.sync.revision
      send: [sync-failed]

  trigger.on-sync-running: |
    - when: app.status != nil and app.status.operationState != nil and app.status.operationState.phase in ['Running']
      oncePer: app.status.sync.revision
      send: [sync-running]
