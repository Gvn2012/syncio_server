# ===================== AUTH =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-auth
  namespace: syncio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: syncio-auth
  template:
    metadata:
      labels:
        app: syncio-auth
    spec:
      containers:
        - name: auth
          image: vietpham18/auth-service:dbc5ffffd8d2de3911f3a4832b286b223413bb78
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://34.21.187.164:3306/syncio
            - name: SPRING_DATASOURCE_USERNAME
              value: gvn
            - name: SPRING_DATASOURCE_PASSWORD
              value: Gvn2012@Phmz
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: syncio-kafka.syncio.svc.cluster.local:9092
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              value: http://syncio-zipkin:9411/api/v2/spans
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-auth
  namespace: syncio
spec:
  selector:
    app: syncio-auth
  ports:
    - port: 8081

