# ===================== TELEGRAM BOT =====================
---
apiVersion: v1
kind: Secret
metadata:
  name: syncio-telegram-bot-secret
  namespace: syncio
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "8771671083:AAGj_8MG9Pwuq0oeHD5uwlSLWjI14FrpBh8"
  ALLOWED_CHAT_IDS: "7537927055"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: syncio-telegram-bot
  namespace: syncio
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: syncio-telegram-bot-pod-reader
  namespace: syncio
rules:
  - apiGroups: [""]
    resources:
      ["pods", "services", "persistentvolumeclaims", "events", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: syncio-telegram-bot-pod-reader
  namespace: syncio
subjects:
  - kind: ServiceAccount
    name: syncio-telegram-bot
    namespace: syncio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: syncio-telegram-bot-pod-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: syncio-telegram-bot-argocd-app-reader
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: syncio-telegram-bot-argocd-app-reader
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: syncio-telegram-bot
    namespace: syncio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: syncio-telegram-bot-argocd-app-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: syncio-telegram-bot-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: syncio-telegram-bot-node-reader
subjects:
  - kind: ServiceAccount
    name: syncio-telegram-bot
    namespace: syncio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: syncio-telegram-bot-node-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-telegram-bot
  namespace: syncio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-telegram-bot
  template:
    metadata:
      labels:
        app: syncio-telegram-bot
    spec:
      serviceAccountName: syncio-telegram-bot
      containers:
        - name: telegram-bot
          image: vietpham18/telegram-bot:f5d71e178bee21a288785d77bd2abc4a0b86d020
          envFrom:
            - secretRef:
                name: syncio-telegram-bot-secret
          env:
            - name: TARGET_NAMESPACE
              value: syncio
            - name: ARGOCD_APP_NAMESPACE
              value: argocd
            - name: ARGOCD_APP_NAME
              value: syncio-app
            - name: SCALABLE_DEPLOYMENTS
              value: syncio-auth,syncio-user,syncio-rs,syncio-post,syncio-permission,syncio-org,syncio-notification,syncio-uploading,syncio-search,syncio-ranking,syncio-messaging
            - name: GITHUB_REPO
              value: Gvn2012/syncio_server
            - name: GITHUB_BRANCH
              value: main
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"


