apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-auth
  namespace: syncio
spec:
  replicas: 1
  minReadySeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: syncio-auth
  template:
    metadata:
      labels:
        app: syncio-auth
    spec:
      containers:
        - name: auth
          image: vietpham18/auth-service:a1104c1e76a6f6e73ceaf379f898b4cf118eb1df
          ports:
            - containerPort: 8081
          startupProbe:
            tcpSocket:
              port: 8081
            periodSeconds: 10
            failureThreshold: 18
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: 8081
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://34.143.230.116:3306/syncio
            - name: SPRING_DATASOURCE_USERNAME
              value: gvn
            - name: SPRING_DATASOURCE_PASSWORD
              value: Gvn2012@Phmz
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: syncio-kafka.syncio.svc.cluster.local:9092
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              value: http://syncio-zipkin:9411/api/v2/spans
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"
            limits:
              cpu: "750m"
              memory: "1280Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-auth
  namespace: syncio
spec:
  selector:
    app: syncio-auth
  ports:
    - port: 8081


