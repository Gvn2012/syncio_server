# ===================== RANKING =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-ranking
  namespace: syncio
spec:
  replicas: 1
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: syncio-ranking
  template:
    metadata:
      labels:
        app: syncio-ranking
    spec:
      containers:
        - name: ranking
          image: vietpham18/ranking-service:c38c01e16fb88e24f0833991a8a67b5e89aed288
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9090
              name: grpc
          startupProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: ranking-models
              mountPath: /app/models
      volumes:
        - name: ranking-models
          persistentVolumeClaim:
            claimName: ranking-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-ranking
  namespace: syncio
spec:
  selector:
    app: syncio-ranking
  ports:
    - port: 8000
      targetPort: 8000
      name: http
    - port: 9090
      targetPort: 9090
      name: grpc


