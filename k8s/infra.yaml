# ===================== ZOOKEEPER =====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-zookeeper
  template:
    metadata:
      labels:
        app: syncio-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-zookeeper
spec:
  selector:
    app: syncio-zookeeper
  ports:
    - port: 2181

# ===================== KAFKA =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-kafka
  template:
    metadata:
      labels:
        app: syncio-kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: syncio-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://syncio-kafka:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-kafka
spec:
  selector:
    app: syncio-kafka
  ports:
    - port: 9092

# ===================== ZIPKIN =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-zipkin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-zipkin
  template:
    metadata:
      labels:
        app: syncio-zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3
          ports:
            - containerPort: 9411
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-zipkin
spec:
  selector:
    app: syncio-zipkin
  ports:
    - port: 9411