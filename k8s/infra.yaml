# ===================== ZOOKEEPER =====================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncio-zookeeper
  namespace: syncio
spec:
  serviceName: "syncio-zookeeper"
  replicas: 3
  selector:
    matchLabels:
      app: syncio-zookeeper
  template:
    metadata:
      labels:
        app: syncio-zookeeper
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: ZOOKEEPER_INIT_LIMIT
              value: "5"
            - name: ZOOKEEPER_SYNC_LIMIT
              value: "2"
            - name: ZOOKEEPER_SERVER_ID
              value: "1"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
            - name: zookeeper-log
              mountPath: /var/lib/zookeeper/log
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi
    - metadata:
        name: zookeeper-log
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-zookeeper
  namespace: syncio
spec:
  clusterIP: None
  selector:
    app: syncio-zookeeper
  ports:
    - port: 2181

# ===================== KAFKA =====================
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncio-kafka
  namespace: syncio
spec:
  serviceName: "syncio-kafka"
  replicas: 3
  selector:
    matchLabels:
      app: syncio-kafka
  template:
    metadata:
      labels:
        app: syncio-kafka
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "-1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: syncio-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://$(HOSTNAME).syncio-kafka.syncio.svc.cluster.local:9092
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512M -Xms512M"
            - name: KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS
              value: "30000"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
              subPath: kafka-data
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-kafka
  namespace: syncio
spec:
  clusterIP: None
  selector:
    app: syncio-kafka
  ports:
    - port: 9092

# ===================== ZIPKIN =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-zipkin
  namespace: syncio
spec:
  replicas: 3
  selector:
    matchLabels:
      app: syncio-zipkin
  template:
    metadata:
      labels:
        app: syncio-zipkin
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3
          ports:
            - containerPort: 9411
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-zipkin
  namespace: syncio
spec:
  selector:
    app: syncio-zipkin
  ports:
    - port: 9411