# ===================== ZOOKEEPER =====================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncio-zookeeper
  namespace: syncio
spec:
  serviceName: "syncio-zookeeper"
  replicas: 1
  selector:
    matchLabels:
      app: syncio-zookeeper
  template:
    metadata:
      labels:
        app: syncio-zookeeper
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          command:
            - /bin/sh
            - -ec
            - |
              ordinal="${HOSTNAME##*-}"
              export ZOOKEEPER_SERVER_ID="$((ordinal + 1))"
              exec /etc/confluent/docker/run
          ports:
            - containerPort: 2181
            - containerPort: 2888
            - containerPort: 3888
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: ZOOKEEPER_INIT_LIMIT
              value: "5"
            - name: ZOOKEEPER_SYNC_LIMIT
              value: "2"
            - name: ZOOKEEPER_SERVERS
              value: "syncio-zookeeper-0.syncio-zookeeper.syncio.svc.cluster.local:2888:3888"
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
            - name: zookeeper-log
              mountPath: /var/lib/zookeeper/log
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "300m"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi
    - metadata:
        name: zookeeper-log
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-zookeeper
  namespace: syncio
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: syncio-zookeeper
  ports:
    - port: 2181
      name: client
    - port: 2888
      name: peer
    - port: 3888
      name: leader-election


# ===================== KAFKA =====================
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncio-kafka
  namespace: syncio
spec:
  serviceName: "syncio-kafka"
  replicas: 1
  selector:
    matchLabels:
      app: syncio-kafka
  template:
    metadata:
      labels:
        app: syncio-kafka
    spec:
      securityContext:
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -ec
            - |
              ordinal="${KAFKA_NODE_NAME##*-}"
              broker_id="$((ordinal + 1))"
              export KAFKA_BROKER_ID="${broker_id}"
              /etc/confluent/docker/configure
              exec /etc/confluent/docker/launch
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: syncio-zookeeper-0.syncio-zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://$(KAFKA_NODE_NAME).syncio-kafka.syncio.svc.cluster.local:9092,EXTERNAL://localhost:29092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: "2"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx768M -Xms768M"
            - name: KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS
              value: "30000"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
              subPath: kafka-data
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-kafka
  namespace: syncio
spec:
  clusterIP: None
  selector:
    app: syncio-kafka
  ports:
    - port: 9092
      name: internal
    - port: 29092
      name: external


