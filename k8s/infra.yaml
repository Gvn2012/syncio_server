# ===================== REDIS =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-redis
  namespace: syncio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-redis
  template:
    metadata:
      labels:
        app: syncio-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            - --maxmemory
            - "128mb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
            - --appendonly
            - "no"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-redis
  namespace: syncio
spec:
  selector:
    app: syncio-redis
  ports:
    - port: 6379


# ===================== REDIS COMMANDER (UI) =====================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncio-redis-commander
  namespace: syncio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncio-redis-commander
  template:
    metadata:
      labels:
        app: syncio-redis-commander
    spec:
      containers:
        - name: redis-commander
          image: rediscommander/redis-commander:latest
          env:
            - name: REDIS_HOSTS
              value: local:syncio-redis:6379
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-redis-commander
  namespace: syncio
spec:
  selector:
    app: syncio-redis-commander
  ports:
    - port: 8081
      targetPort: 8081


# ===================== ELASTICSEARCH =====================
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: syncio-elasticsearch
  namespace: syncio
spec:
  serviceName: "syncio-elasticsearch"
  replicas: 1
  selector:
    matchLabels:
      app: syncio-elasticsearch
  template:
    metadata:
      labels:
        app: syncio-elasticsearch
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox
          command:
            ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
        - name: increase-vm-max-map-count
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
          ports:
            - containerPort: 9200
              name: rest
            - containerPort: 9300
              name: nodes
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms1536m -Xmx1536m"
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: "500m"
              memory: "2.5Gi"
            limits:
              cpu: "1"
              memory: "4Gi"
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: syncio-elasticsearch
  namespace: syncio
spec:
  selector:
    app: syncio-elasticsearch
  ports:
    - port: 9200
      name: rest
    - port: 9300
      name: nodes


