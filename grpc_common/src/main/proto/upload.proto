syntax = "proto3";

package io.github.gvn2012.grpc.upload;

option java_multiple_files = true;
option java_package = "io.github.gvn2012.grpc.upload";

service UploadService {
  rpc GetSignedUrls (SignedUrlGrpcRequest) returns (SignedUrlGrpcResponse);
  rpc GetDownloadUrls (DownloadUrlGrpcRequest) returns (DownloadUrlGrpcResponse);
}

message SignedUrlGrpcRequest {
  map<string, string> objectPathsWithContentType = 1;
}

message SignedUrlGrpcResponse {
  map<string, string> signedUrls = 1;
}

message DownloadUrlGrpcRequest {
  repeated string objectPaths = 1;
}

message DownloadUrlGrpcResponse {
  map<string, string> downloadUrls = 1;
}
