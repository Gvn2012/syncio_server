syntax = "proto3";

package io.github.gvn2012.grpc;

option java_multiple_files = true;
option java_package = "io.github.gvn2012.grpc.permission";
option java_outer_classname = "PermissionProto";

service PermissionService {
  rpc GetUserRoles (UserRolesRequest) returns (UserRolesResponse);
  rpc InitUserRole (InitUserRoleRequest) returns (InitUserRoleResponse);
}

message InitUserRoleRequest {
  string user_id = 1;
  string registration_type = 2;
}

message InitUserRoleResponse {
  bool success = 1;
}

message UserRolesRequest {
  string user_id = 1;
}

message RoleSummary {
  string role_id = 1;
  string role_name = 2;
  string color = 3;
  string icon = 4;
  int32 display_order = 5;
}

message UserRolesResponse {
  repeated RoleSummary roles = 1;
}
